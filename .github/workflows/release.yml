name: Release Nimbus

# This workflow lives in Yoodule/nimbus (the public release repo).
# It triggers on a v* tag push to this repo. The actual source is
# Yoodule/nimbus-gateway (the dev repo) — we check it out by tag and
# build there. The tag in this repo just needs to exist; the build
# commit lives in the dev repo.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin
            arch: arm64
            ext: ""
          - os: macos-13
            target: darwin
            arch: amd64
            ext: ""
          - os: ubuntu-latest
            target: linux
            arch: amd64
            ext: ""
          - os: windows-latest
            target: windows
            arch: amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Resolve source commit
        id: resolve
        # The tag in this repo may be a simple ref pointing at a commit
        # that lives in the dev repo. We resolve the source SHA from the
        # matching tag in Yoodule/nimbus-gateway.
        run: |
          VERSION=${GITHUB_REF_NAME}
          SOURCE_SHA=$(curl -fsSL \
            "https://api.github.com/repos/Yoodule/nimbus-gateway/git/refs/tags/${VERSION}" \
            | sed -n 's/.*"sha": *"\([0-9a-f]\{40\}\)".*/\1/p' | head -n1)
          if [ -z "$SOURCE_SHA" ]; then
            echo "::error::Could not resolve source commit for tag ${VERSION} in Yoodule/nimbus-gateway"
            exit 1
          fi
          echo "sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${VERSION} -> ${SOURCE_SHA}" >&2

      - name: Checkout source from dev repo
        uses: actions/checkout@v4
        with:
          repository: Yoodule/nimbus-gateway
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard
          if [ "${{ matrix.target }}" = "linux" ]; then pip install patchelf; fi
          pip install .

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'dashboard/pnpm-lock.yaml'

      - name: Inject Version into Orchestrator
        run: |
          VERSION=${GITHUB_REF_NAME}
          sed -i.bak "s/NIMBUS_VERSION = .*/NIMBUS_VERSION = \"$VERSION\"/g" nimbus.py

      - name: Build Gateway with Nuitka
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --remove-output \
            --output-filename=nimbus-gateway-${{ matrix.target }}-${{ matrix.arch }} \
            src/nimbus_gateway/server.py

      - name: Build Orchestrator with Nuitka
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --remove-output \
            --output-filename=nimbus-${{ matrix.target }}-${{ matrix.arch }} \
            nimbus.py

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            dashboard/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('dashboard/pnpm-lock.yaml') }}-${{ hashFiles('dashboard/src/**/*.js', 'dashboard/src/**/*.jsx', 'dashboard/src/**/*.ts', 'dashboard/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('dashboard/pnpm-lock.yaml') }}-

      - name: Build Dashboard
        env:
          NEXT_STANDALONE_OUTPUT: "1"
        run: |
          cd dashboard
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package Dashboard
        run: |
          mkdir -p dashboard-dist/dashboard
          cp -r dashboard/.next/standalone/. dashboard-dist/dashboard/
          cp -r dashboard/.next/static dashboard-dist/dashboard/.next/static
          cp -r dashboard/public dashboard-dist/dashboard/public
          tar -czvf dashboard.tar.gz -C dashboard-dist dashboard

      - name: Package Release
        run: |
          mkdir -p release
          cp nimbus-gateway-${{ matrix.target }}-${{ matrix.arch }}${{ matrix.ext }} release/nimbus-gateway${{ matrix.ext }}
          cp nimbus-${{ matrix.target }}-${{ matrix.arch }}${{ matrix.ext }} release/nimbus${{ matrix.ext }}
          cp mcp.json release/
          cp -r servers release/

          # Trim to keep the tarball small
          find release/servers -type d \( -name ".venv" -o -name "venv" -o -name "node_modules" -o -name ".pytest_cache" -o -name "__pycache__" \) -exec rm -rf {} +

          tar -czvf nimbus-${{ matrix.target }}-${{ matrix.arch }}.tar.gz -C release .

      - name: Generate SHA256SUMS
        run: |
          sha256sum nimbus-gateway-* nimbus-* dashboard.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest@v1
        with:
          subject-path: |
            nimbus-${{ matrix.target }}-${{ matrix.arch }}.tar.gz
            dashboard.tar.gz
            SHA256SUMS

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nimbus-${{ matrix.target }}-${{ matrix.arch }}.tar.gz
            dashboard.tar.gz
            SHA256SUMS
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
