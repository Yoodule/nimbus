site_name: Nimbus
site_url: https://nimbus.yoodule.com
site_description: Your 24/7 Employee
copyright: Built by <a href="https://www.linkedin.com/in/sundayj1213/?utm_source=nimbus&utm_medium=docs&utm_campaign=footer" target="_blank">Sunday Johnson</a> at <a href="https://yoodule.com?utm_source=nimbus&utm_medium=docs&utm_campaign=footer">Yoodule</a>

extra_css:
  - extra.css

# Pagefind's UI is loaded by overrides/main.html (extrahead + extrafooter
# blocks). The per-locale index shards are built by the mkdocs hook at
# scripts/pagefind_hook.py (registered below in the `hooks:` block).
# The hook runs on `on_post_build`, so the shards land in site/pagefind/
# regardless of whether the build was triggered by `mkdocs build`,
# `mkdocs serve`, or `mkdocs gh-deploy` (which runs its own build).
#
# Why Pagefind instead of mkdocs-material's built-in search:
#   - The built-in search plugin uses a single shared lunr multiLanguage
#     index, with config.lang = [en, ko, es, fr, ja, zh]. lunr-languages'
#     multiLanguage tokenizer is broken for CJK (lunr-languages#45, open
#     since 2022; upstream fix in 1.15.0 has not reached mkdocs-material's
#     bundled lunr copy as of 2026-07). On /ko/, the multiLanguage index
#     returns English results because (a) the union of stemmers doesn't
#     segment ja/ko/zh, and (b) 78 English docs dominate scoring against
#     31 Korean docs.
#   - Pagefind reads <html lang="..."> at index time and at search time,
#     and ships one .pf_index shard per locale. The /ko/ search input
#     hits only the ko shard with a Korean-tuned tokenizer (jieba for zh,
#     bigram for ja/ko). Search results are per-locale by construction.

theme:
  name: material
  custom_dir: overrides
  logo: static/favicon.svg
  favicon: static/favicon.svg
  palette:
    # Default to beautiful dark mode
    - scheme: slate
      primary: black
      accent: white
  features:
    # navigation.instant is INCOMPATIBLE with the i18n plugin's
    # contextual language switcher (the plugin emits a hard WARNING
    # per-locale-build about this, which --strict turns into an
    # error). The mkdocs-static-i18n README documents this as a
    # known limitation: the language switcher uses an out-of-band
    # <a> tag that instant-navigation tries to intercept, and the
    # two fight. The trade-off is acceptable: full-page loads on
    # nav transitions are <100 ms on a gh-pages CDN, and the
    # language switcher is a hard product requirement.
    - navigation.tracking
    - navigation.tabs
    - content.code.copy
    # search.suggest / search.highlight are removed: Pagefind ships
    # its own suggestion + highlight UI in the modal it mounts in
    # the search button we inject via overrides/main.html.

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

plugins:
  # i18n (mkdocs-static-i18n) is a third-party plugin, not built into
  # mkdocs-material. The uvx invocation in scripts/deploy-docs.sh
  # includes `--with mkdocs-static-i18n` to pull it into the same
  # ephemeral env as mkdocs-material.
  #
  # Folder convention: docs/<locale>/<page>.md (one folder per locale,
  # English is the source of truth under docs/en/). The plugin
  # cross-links sibling locales via a language picker in the top bar.
  #
  # Locale list MUST match scripts/check_translations.py:SUPPORTED_LOCALES
  # (and, in the other repos, nimbus-cli/src/locale.rs and
  # dashboard/src/lib/const.ts). When adding a locale, add it everywhere.
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        # nav_translations is a PER-LANGUAGE key (not a top-level
          # key). It maps each default-locale nav title to its
          # translated form. File paths in the top-level nav: stay
          # unlocalized; the plugin resolves the right per-locale
          # file from docs/<locale>/<page>.md automatically.
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Download: 다운로드
            Cloud: 클라우드
            Official License: 공식 라이선스
            Terms of Service: 서비스 약관
            Privacy Policy: 개인정보처리방침
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Download: Descarga
            Cloud: Nube
            Official License: Licencia oficial
            Terms of Service: Términos de servicio
            Privacy Policy: Política de privacidad
        - locale: fr
          name: Français
          build: true
          nav_translations:
            Home: Accueil
            Download: Téléchargement
            Cloud: Cloud
            Official License: Licence officielle
            Terms of Service: Conditions d'utilisation
            Privacy Policy: Politique de confidentialité
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Download: ダウンロード
            Cloud: クラウド
            Official License: 公式ライセンス
            Terms of Service: 利用規約
            Privacy Policy: プライバシーポリシー
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Download: 下载
            Cloud: 云
            Official License: 官方许可
            Terms of Service: 服务条款
            Privacy Policy: 隐私政策
  # The built-in `search` plugin is intentionally omitted. Pagefind
  # ships its own search UI mounted via overrides/main.html; keeping
  # the built-in plugin here would write a stale site/search/
  # search_index.json that no one reads (the user lands on the
  # Pagefind modal from the header).

# mkdocs hooks: run as part of every `mkdocs build`, including the
# build triggered by `mkdocs gh-deploy`. This is the load-bearing
# reason we use a hook rather than a post-build shell step in
# deploy-docs.sh: `mkdocs gh-deploy` always runs its own `mkdocs
# build` before pushing to gh-pages, so any site/ we pagefind from
# a prior step is wiped. The hook runs INSIDE that embedded build.
hooks:
  - scripts/pagefind_hook.py

# nav is the English (default-locale) nav. The i18n plugin resolves
# each per-locale file from docs/<locale>/<page>.md automatically, so
# the paths here use the en/ prefix. The other locales' titles come
# from the nav_translations block inside each language entry above.
nav:
  - Home: en/index.md
  - Download: en/download.md
  - Cloud: en/cloud.md
  - Official License: en/license.md
  - Terms of Service: en/terms_of_service.md
  - Privacy Policy: en/privacy_policy.md
